# Fly.io deploy for the all-in-one CourtOps POC image (Postgres + API + frontend
# in one container). Gives HTTPS on 443 automatically via *.fly.dev (valid cert).
#
# Persistent data (recommended for a real working instance):
#   fly volumes create courtops_data --size 1 --region iad   # once
#   fly secrets set ADMIN_PASSWORD='choose-a-strong-one'
#   fly deploy
#   fly open   # -> https://courtops-poc.fly.dev
#
# The volume mounts at /data; PGDATA is /data/pgdata (a subdirectory so initdb
# is not blocked by the volume's lost+found). First boot of an empty volume
# runs initdb + demo seed; later boots keep your data across redeploys/restarts.
# The entrypoint chowns the mount as root then drops to the postgres user.
#
# Ephemeral demo (no volume): remove the [[mounts]] block and the PGDATA env
# override — the image's baked demo at /opt/courtops/pgdata is used, and
# restarts reset to that pristine demo.

app = "courtops-poc"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  # Persist the DB on the volume (not the image-layer baked path).
  PGDATA = "/data/pgdata"
  # ENV=dev is the image default; the prod boot-guard requires TLS/non-default DB
  # settings that don't fit the bundled-Postgres POC, so keep dev for this demo
  # topology. Harden the admin login with:
  #   fly secrets set ADMIN_PASSWORD='choose-a-strong-one'

[[mounts]]
  source = "courtops_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true          # 443 -> redirects http; cert is auto-managed
  # Keep one machine warm so Postgres + volume stay up (scale-to-zero freezes
  # the machine; data on the volume is fine, but cold start is slower).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  # The bundled Postgres needs a few seconds on a cold start, hence grace_period.
  [[http_service.checks]]
    method = "get"
    path = "/api/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "45s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
