<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CourtOps Tennis</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>CourtOps Tennis</h1>
    <p class="sub">Officials &amp; tournament admin
      <span id="health" class="pill">checking…</span>
    </p>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-target="panel-tournaments">Tournaments</button>
    <button class="tab" data-target="panel-sites">Sites</button>
    <button class="tab" data-target="panel-officials">Officials</button>
    <button class="tab" data-target="panel-players">Players</button>
    <button class="tab" data-target="panel-rates">Rates</button>
    <button class="tab" data-target="panel-hotels">Hotels</button>
    <button class="tab" data-target="panel-room-blocks">Room blocks</button>
    <button class="tab" data-target="panel-distances">Distances</button>
  </nav>

  <main>
    <!-- ===== Tournaments (hub) ===== -->
    <section class="panel active" id="panel-tournaments">
      <div class="master-detail">
        <div class="list-pane">
          <div class="list-toolbar">
            <input class="filter" type="search" placeholder="Filter tournaments…" />
            <button type="button" class="new-btn">+ New</button>
          </div>
          <table class="list-table">
            <thead><tr><th>ID</th><th>Name</th><th>Type</th><th></th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="detail-pane">
          <h3 class="detail-title"></h3>
          <form id="tournament-form" autocomplete="off">
            <div class="row">
              <label>Name <input name="name" required /></label>
              <label>Type
                <select name="type"><option value="junior">junior</option><option value="adult">adult</option></select>
              </label>
            </div>
            <div class="row">
              <label>Play start <input type="date" name="play_start_date" required /></label>
              <label>Play end <input type="date" name="play_end_date" required /></label>
            </div>
            <div class="row">
              <label>Registration deadline <input type="date" name="registration_deadline" /></label>
              <label>Late-entry deadline <input type="date" name="late_entry_deadline" /></label>
            </div>
            <div class="actions-row">
              <button type="submit">Save</button>
              <button type="button" class="delete" hidden>Delete</button>
              <button type="button" class="cancel">New</button>
              <span class="msg" id="tournament-msg"></span>
            </div>
          </form>

          <div id="tournament-extras" hidden>
            <!-- Sites mapping -->
            <div class="subcard">
              <h4>Sites</h4>
              <div id="hub-site-checks" class="checks"></div>
              <div class="actions-row">
                <button type="button" id="hub-sites-save">Save sites</button>
                <span class="msg" id="hub-sites-msg"></span>
              </div>
            </div>

            <!-- Players (roster) mapping -->
            <div class="subcard">
              <h4>Players (roster)</h4>
              <form id="roster-form" autocomplete="off" class="inline-form">
                <div class="row">
                  <label>Player <select name="player_id" id="roster-player" required></select></label>
                  <label>Division <input name="age_division" /></label>
                  <label>Status
                    <select name="selection_status">
                      <option value="selected">selected</option>
                      <option value="alternate">alternate</option>
                      <option value="withdrawn">withdrawn</option>
                    </select>
                  </label>
                </div>
                <div class="row">
                  <label>Events <input name="events" /></label>
                  <label>T-shirt <input name="t_shirt_size" /></label>
                  <label>Dietary <input name="dietary_preference" /></label>
                </div>
                <div class="actions-row">
                  <button type="submit">Add player</button>
                  <button type="button" class="cancel">Clear</button>
                  <span class="msg" id="roster-msg"></span>
                </div>
              </form>
              <table id="roster-table" class="list-table">
                <thead><tr><th>Player</th><th>Div</th><th>Status</th><th>Shirt</th><th>Dietary</th><th></th></tr></thead>
                <tbody></tbody>
              </table>
            </div>

            <!-- Officials (assignments) mapping -->
            <div class="subcard">
              <h4>Officials (assignments)</h4>
              <form id="asg-form" autocomplete="off" class="inline-form">
                <div class="row">
                  <label>Official <select name="official_id" id="asg-official" required></select></label>
                  <label>Site (mileage) <select name="site_id" id="asg-site"></select></label>
                  <label>Room block <select name="room_block_id" id="asg-room-block"></select></label>
                </div>
                <div class="actions-row">
                  <button type="submit">Add official</button>
                  <button type="button" class="cancel">Clear</button>
                  <span class="msg" id="asg-msg"></span>
                </div>
              </form>
              <div id="asg-list"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== Sites ===== -->
    <section class="panel" id="panel-sites">
      <div class="master-detail">
        <div class="list-pane">
          <div class="list-toolbar">
            <input class="filter" type="search" placeholder="Filter sites…" />
            <button type="button" class="new-btn">+ New</button>
          </div>
          <table class="list-table"><thead><tr><th>ID</th><th>Code</th><th>Name</th><th>City</th><th></th></tr></thead><tbody></tbody></table>
        </div>
        <div class="detail-pane">
          <h3 class="detail-title"></h3>
          <form id="site-form" autocomplete="off">
            <div class="row">
              <label>Code <input name="code" placeholder="JDS" /></label>
              <label>Name <input name="name" required /></label>
            </div>
            <div class="row">
              <label>Street <input name="street" /></label>
              <label>City <input name="city" /></label>
            </div>
            <div class="row">
              <label>State <input name="state" maxlength="2" /></label>
              <label>Zip <input name="zip" /></label>
            </div>
            <div class="actions-row">
              <button type="submit">Save</button>
              <button type="button" class="delete" hidden>Delete</button>
              <button type="button" class="cancel">New</button>
              <span class="msg" id="site-msg"></span>
            </div>
          </form>
        </div>
      </div>
    </section>

    <!-- ===== Officials ===== -->
    <section class="panel" id="panel-officials">
      <div class="master-detail">
        <div class="list-pane">
          <div class="list-toolbar">
            <input class="filter" type="search" placeholder="Filter officials…" />
            <button type="button" class="new-btn">+ New</button>
          </div>
          <table class="list-table"><thead><tr><th>ID</th><th>Name</th><th>City/St</th><th></th></tr></thead><tbody></tbody></table>
        </div>
        <div class="detail-pane">
          <h3 class="detail-title"></h3>
          <form id="official-form" autocomplete="off">
            <div class="row">
              <label>First name <input name="first_name" required /></label>
              <label>Last name <input name="last_name" required /></label>
            </div>
            <div class="row">
              <label>Street <input name="street" /></label>
              <label>City <input name="city" /></label>
            </div>
            <div class="row">
              <label>State <input name="state" maxlength="2" /></label>
              <label>Zip <input name="zip" /></label>
            </div>
            <div class="row">
              <label>Phone <input name="phone" /></label>
              <label>Email <input name="email" type="email" /></label>
            </div>
            <div class="row">
              <label>Dietary restrictions <input name="dietary_restrictions" /></label>
            </div>
            <div class="actions-row">
              <button type="submit">Save</button>
              <button type="button" class="delete" hidden>Delete</button>
              <button type="button" class="cancel">New</button>
              <span class="msg" id="official-msg"></span>
            </div>
          </form>
        </div>
      </div>
    </section>

    <!-- ===== Players ===== -->
    <section class="panel" id="panel-players">
      <div class="master-detail">
        <div class="list-pane">
          <div class="list-toolbar">
            <input class="filter" type="search" placeholder="Filter players…" />
            <button type="button" class="new-btn">+ New</button>
          </div>
          <table class="list-table"><thead><tr><th>ID</th><th>USTA #</th><th>Name</th><th></th></tr></thead><tbody></tbody></table>
        </div>
        <div class="detail-pane">
          <h3 class="detail-title"></h3>
          <form id="player-form" autocomplete="off">
            <div class="row"><label>USTA # <input name="usta_number" required /></label></div>
            <div class="row">
              <label>First name <input name="first_name" /></label>
              <label>Last name <input name="last_name" /></label>
            </div>
            <div class="actions-row">
              <button type="submit">Save</button>
              <button type="button" class="delete" hidden>Delete</button>
              <button type="button" class="cancel">New</button>
              <span class="msg" id="player-msg"></span>
            </div>
          </form>
        </div>
      </div>
    </section>

    <!-- ===== Rates ===== -->
    <section class="panel" id="panel-rates">
      <div class="master-detail">
        <div class="list-pane">
          <div class="list-toolbar">
            <input class="filter" type="search" placeholder="Filter rates…" />
            <button type="button" class="new-btn">+ New</button>
          </div>
          <table class="list-table"><thead><tr><th>ID</th><th>Cert</th><th>Rate/day</th><th>Effective</th><th></th></tr></thead><tbody></tbody></table>
        </div>
        <div class="detail-pane">
          <h3 class="detail-title"></h3>
          <form id="rate-form" autocomplete="off">
            <div class="row">
              <label>Certification
                <select name="cert_type"><option value="roving">roving</option><option value="chair">chair</option><option value="referee">referee</option></select>
              </label>
              <label>Rate per day ($) <input type="number" name="rate_per_day" min="0" step="0.01" required /></label>
            </div>
            <div class="row"><label>Effective from <input type="date" name="effective_from" /></label></div>
            <div class="actions-row">
              <button type="submit">Save</button>
              <button type="button" class="delete" hidden>Delete</button>
              <button type="button" class="cancel">New</button>
              <span class="msg" id="rate-msg"></span>
            </div>
          </form>
        </div>
      </div>
    </section>

    <!-- ===== Hotels (properties) ===== -->
    <section class="panel" id="panel-hotels">
      <div class="master-detail">
        <div class="list-pane">
          <div class="list-toolbar">
            <input class="filter" type="search" placeholder="Filter hotels…" />
            <button type="button" class="new-btn">+ New</button>
          </div>
          <table class="list-table"><thead><tr><th>ID</th><th>Name</th><th>City</th><th></th></tr></thead><tbody></tbody></table>
        </div>
        <div class="detail-pane">
          <h3 class="detail-title"></h3>
          <form id="hotel-form" autocomplete="off">
            <div class="row">
              <label>Name <input name="name" required /></label>
              <label>Website <input name="website" /></label>
            </div>
            <div class="row">
              <label>Street <input name="street" /></label>
              <label>City <input name="city" /></label>
            </div>
            <div class="row">
              <label>State <input name="state" maxlength="2" /></label>
              <label>Zip <input name="zip" /></label>
            </div>
            <div class="row"><label>Phone <input name="phone" /></label></div>
            <div class="actions-row">
              <button type="submit">Save</button>
              <button type="button" class="delete" hidden>Delete</button>
              <button type="button" class="cancel">New</button>
              <span class="msg" id="hotel-msg"></span>
            </div>
          </form>
        </div>
      </div>
    </section>

    <!-- ===== Room blocks ===== -->
    <section class="panel" id="panel-room-blocks">
      <div class="master-detail">
        <div class="list-pane">
          <div class="list-toolbar">
            <input class="filter" type="search" placeholder="Filter room blocks…" />
            <button type="button" class="new-btn">+ New</button>
          </div>
          <table class="list-table"><thead><tr><th>ID</th><th>Hotel</th><th>Rooms</th><th>Tournament</th><th></th></tr></thead><tbody></tbody></table>
        </div>
        <div class="detail-pane">
          <h3 class="detail-title"></h3>
          <form id="room-block-form" autocomplete="off">
            <div class="row">
              <label>Hotel <select name="hotel_id" id="rb-hotel" required></select></label>
              <label>Tournament <select name="tournament_id" id="rb-tournament"></select></label>
            </div>
            <div class="row">
              <label>Rooms <input type="number" name="room_count" min="0" step="1" value="0" /></label>
              <label>Confirmation # <input name="confirmation_number" /></label>
            </div>
            <div class="row">
              <label>Check-in <input type="date" name="check_in" /></label>
              <label>Check-out <input type="date" name="check_out" /></label>
            </div>
            <div class="row"><label>Cancellation info <input name="cancellation_info" /></label></div>
            <div class="actions-row">
              <button type="submit">Save</button>
              <button type="button" class="delete" hidden>Delete</button>
              <button type="button" class="cancel">New</button>
              <span class="msg" id="room-block-msg"></span>
            </div>
          </form>
        </div>
      </div>
    </section>

    <!-- ===== Distances ===== -->
    <section class="panel" id="panel-distances">
      <div class="master-detail">
        <div class="list-pane">
          <div class="list-toolbar">
            <input class="filter" type="search" placeholder="Filter distances…" />
            <button type="button" class="new-btn">+ New</button>
          </div>
          <table class="list-table"><thead><tr><th>ID</th><th>Official</th><th>Site</th><th>1-way mi</th><th></th></tr></thead><tbody></tbody></table>
        </div>
        <div class="detail-pane">
          <h3 class="detail-title"></h3>
          <form id="distance-form" autocomplete="off">
            <div class="row">
              <label>Official <select name="official_id" id="dist-official" required></select></label>
              <label>Site <select name="site_id" id="dist-site" required></select></label>
            </div>
            <div class="row">
              <label>One-way miles <input type="number" name="one_way_miles" min="0" step="0.1" required /></label>
              <label>Source
                <select name="source"><option value="manual">manual</option><option value="geocoded">geocoded</option></select>
              </label>
            </div>
            <div class="actions-row">
              <button type="submit">Save</button>
              <button type="button" class="delete" hidden>Delete</button>
              <button type="button" class="cancel">New</button>
              <span class="msg" id="distance-msg"></span>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
